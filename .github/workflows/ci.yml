name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Poetry
        run: pipx install poetry==1.8.3
      - name: Install dependencies
        run: poetry install --with dev
      - name: Lint
        run: poetry run ruff check src tests
      - name: Type-check
        run: poetry run mypy src || true   # advisory in MVP
      - name: Test
        env:
          PCA_DATABASE_URL: sqlite+aiosqlite:///:memory:
          PCA_LLM_PROVIDER: mock
          PCA_JWT_SECRET: ci-secret
        run: poetry run pytest -q

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -f docker/Dockerfile -t pca:ci .
