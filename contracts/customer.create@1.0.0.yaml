contract_id: customer.create
version: 1.0.0
description: Create a new customer record.

intent_examples:
  - Create a customer named John
  - Add a new customer
  - Register a client named Sarah with email sarah@acme.com
  - Onboard a new customer

permissions:
  - sales_admin

input_schema:
  name:
    type: string
    required: true
    description: Full name of the customer.
  email:
    type: string
    required: true
    description: Primary contact email.

validation_rules:
  - valid_email
  - unique_email
  - non_empty_name

allowed_tools:
  - customer_db

output_schema:
  customer_id:
    type: string
    description: Generated customer identifier.
  name:
    type: string
  email:
    type: string
